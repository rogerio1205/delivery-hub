<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>DeliveryHub</title>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDQC2JCQhdB38fTrvmNz_Wbv0arXvmsR8g&libraries=geometry&callback=initMap" async defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#667eea;--success:#28a745;--danger:#dc3545;
  --ifood:#ea1d2c;--uber:#222;--keeta:#00b4d8;--loggi:#ff6b00;
  --bg:#f0f2f5;--card:#fff;--border:#e0e0e0;--muted:#888;
  --shadow:0 4px 18px rgba(0,0,0,.10);--radius:14px;
}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(102,126,234,.4)}
.header h1{font-size:18px;font-weight:800}
.header p{font-size:11px;opacity:.85;margin-top:1px}
.hstatus{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700}
.dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
.tbar{height:3px;background:#ddd}
.tbar-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);animation:tbar 2s linear infinite;transform-origin:left}
@keyframes tbar{0%{transform:scaleX(1)}100%{transform:scaleX(0)}}

/* LAYOUT */
.layout{display:flex;flex:1;gap:12px;padding:12px;max-width:1400px;margin:0 auto;width:100%}
.col-left{flex:1;display:flex;flex-direction:column;gap:12px;min-width:0}
.col-right{width:360px;display:flex;flex-direction:column;gap:12px;flex-shrink:0}

/* MAPA */
.map-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
#map{height:280px;width:100%}
.map-foot{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;background:#fafafa;border-top:1px solid var(--border)}
.map-coords{font-size:11px;color:var(--muted)}
.btn-loc{padding:8px 14px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer}

/* FILTROS */
.cfg-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
.cfg-card h3{font-size:14px;font-weight:700;margin-bottom:12px}
.cfg-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.cfg-field label{display:block;font-size:11px;color:var(--muted);font-weight:700;margin-bottom:4px;text-transform:uppercase}
.cfg-field input{width:100%;padding:9px 10px;border:2px solid var(--border);border-radius:8px;font-size:13px;background:#fafafa}
.cfg-field input:focus{outline:none;border-color:var(--primary)}
.btn-save{width:100%;padding:11px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer}

/* PLATAFORMAS */
.plt-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
.plt-card h3{font-size:14px;font-weight:700;margin-bottom:12px}
.plt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.plt-btn{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;cursor:pointer;border:2px solid transparent;background:#f8f8f8;user-select:none}
.plt-btn.on-ifood{border-color:var(--ifood);background:#fff5f5}
.plt-btn.on-ubereats{border-color:var(--uber);background:#f5f5f5}
.plt-btn.on-keeta{border-color:var(--keeta);background:#f0faff}
.plt-btn.on-loggi{border-color:var(--loggi);background:#fff8f0}
.plt-btn.off{opacity:.4;border-color:var(--border)!important;background:#f0f0f0!important}
.plt-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.plt-name{font-size:12px;font-weight:800;flex:1}
.plt-cnt{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;background:rgba(0,0,0,.07);min-width:22px;text-align:center}

/* STATS */
.stats-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.stat-box{text-align:center;padding:10px 6px;border-radius:10px;border-top:3px solid var(--primary);background:#f5f7ff}
.stat-box.ifood{border-color:var(--ifood);background:#fff5f5}
.stat-box.uber{border-color:var(--uber);background:#f5f5f5}
.stat-box.keeta{border-color:var(--keeta);background:#f0faff}
.stat-box.loggi{border-color:var(--loggi);background:#fff8f0}
.stat-v{font-size:20px;font-weight:800;color:#333}
.stat-l{font-size:10px;color:var(--muted);margin-top:3px;font-weight:700;text-transform:uppercase}

/* LISTA OFERTAS */
.rides-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden}
.rides-head{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.rides-head h3{font-size:15px;font-weight:700}
.rides-badge{background:var(--primary);color:#fff;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700}
.rides-list{overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:12px;max-height:560px}

/* ═══════════════════════════════════════════
   CARD ESTILO KEETA/IFOOD — igual ao app
   ═══════════════════════════════════════════ */
.offer-card{
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 6px 24px rgba(0,0,0,.13);
  animation:slideDown .35s cubic-bezier(.34,1.56,.64,1);
  position:relative;
}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}

/* Cabeçalho escuro — igual ao app Keeta */
.offer-head{
  padding:18px 18px 14px;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  position:relative;
}
.offer-card.keeta   .offer-head{background:#1a1a1a}
.offer-card.ifood   .offer-head{background:#1a1a1a}
.offer-card.ubereats .offer-head{background:#000}
.offer-card.loggi   .offer-head{background:#1a1a1a}

/* Logo da plataforma */
.offer-logo{
  width:52px;height:52px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;color:#fff;
  flex-shrink:0;
}
.offer-card.keeta   .offer-logo{background:#f5c518;color:#000}
.offer-card.ifood   .offer-logo{background:#ea1d2c}
.offer-card.ubereats .offer-logo{background:#fff;color:#000}
.offer-card.loggi   .offer-logo{background:#ff6b00}

/* Valor grande */
.offer-earn{
  font-size:36px;font-weight:900;color:#fff;
  line-height:1;
}

/* Timer circular */
.offer-timer-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.offer-timer-circle{
  width:52px;height:52px;border-radius:50%;
  border:4px solid rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:900;color:#fff;
  position:relative;
  flex-shrink:0;
}
.offer-timer-circle svg{position:absolute;top:-4px;left:-4px;width:60px;height:60px}
.offer-timer-circle svg circle{fill:none;stroke-width:4;stroke-linecap:round;transform:rotate(-90deg);transform-origin:30px 30px}
.offer-timer-circle.urgente{border-color:#ff4444;color:#ff4444}
.offer-timer-circle.urgente svg circle{stroke:#ff4444}
.offer-timer-num{font-size:17px;font-weight:900;position:relative;z-index:1}

/* Barra de tempo embaixo do header */
.offer-progress{height:5px;background:rgba(255,255,255,.15);position:relative}
.offer-progress-fill{height:100%;transition:width 1s linear}
.offer-card.keeta   .offer-progress-fill{background:#f5c518}
.offer-card.ifood   .offer-progress-fill{background:#ea1d2c}
.offer-card.ubereats .offer-progress-fill{background:#fff}
.offer-card.loggi   .offer-progress-fill{background:#ff6b00}

/* Corpo branco — endereços */
.offer-body{background:#fff;padding:14px 16px 10px}

.offer-km{
  display:inline-flex;align-items:center;gap:6px;
  background:#f0f0f0;border-radius:20px;
  padding:5px 12px;font-size:13px;font-weight:800;
  margin-bottom:12px;color:#333;
}

.offer-route{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.offer-row{display:flex;align-items:flex-start;gap:10px}
.offer-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.offer-addr{font-size:13px;color:#333;line-height:1.4}
.offer-addr-sub{font-size:11px;color:var(--muted);margin-top:2px}
.offer-divider{height:1px;background:#f0f0f0;margin:0 0 0 26px}

/* Botão ACEITAR — igual ao "Pegar" do Keeta */
.offer-btn-wrap{padding:0 16px 16px}
.btn-pegar{
  width:100%;padding:16px;
  border:none;border-radius:12px;
  font-size:17px;font-weight:900;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  letter-spacing:.3px;
  transition:transform .1s, box-shadow .1s;
}
.offer-card.keeta   .btn-pegar{background:#f5c518;color:#000;box-shadow:0 4px 16px rgba(245,197,24,.5)}
.offer-card.ifood   .btn-pegar{background:#ea1d2c;color:#fff;box-shadow:0 4px 16px rgba(234,29,44,.4)}
.offer-card.ubereats .btn-pegar{background:#000;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.offer-card.loggi   .btn-pegar{background:#ff6b00;color:#fff;box-shadow:0 4px 16px rgba(255,107,0,.4)}
.btn-pegar:active{transform:scale(.97)}
.btn-pegar.urgente{animation:blink .5s infinite}

/* Botão rejeitar discreto */
.btn-skip{
  width:100%;padding:10px;background:none;border:none;
  color:var(--muted);font-size:13px;font-weight:700;
  cursor:pointer;margin-top:-4px;
  display:block;text-align:center;
  padding-bottom:12px;
}

.empty{text-align:center;color:var(--muted);padding:40px 20px;display:flex;flex-direction:column;align-items:center;gap:10px}
.empty-icon{font-size:42px;opacity:.4}

/* ALERTA TOPO */
.alert-real{position:fixed;top:68px;left:50%;transform:translateX(-50%);background:#ea1d2c;color:#fff;padding:14px 22px;border-radius:14px;font-weight:800;font-size:14px;box-shadow:0 8px 30px rgba(234,29,44,.5);z-index:9997;display:none;text-align:center;width:92%;max-width:380px}
.alert-real.show{display:block;animation:blink .6s infinite}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:12px 22px;background:#333;color:#fff;border-radius:30px;font-size:13px;font-weight:700;box-shadow:0 6px 24px rgba(0,0,0,.25);z-index:9999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}
.toast.info{background:var(--primary)}
.toast.real{background:#1a1a1a}

@media(max-width:960px){
  .layout{flex-direction:column}
  .col-right{width:100%}
  #map{height:220px}
  .cfg-grid{grid-template-columns:1fr 1fr}
  .offer-earn{font-size:32px}
}
</style>
</head>
<body>

<div class="alert-real" id="alertReal">🚨 Nova oferta!</div>

<div class="header">
  <div><h1>🚗 DeliveryHub</h1><p>Monitor em Tempo Real</p></div>
  <div class="hstatus"><div class="dot"></div><span id="hstatusText">Online</span></div>
</div>
<div class="tbar"><div class="tbar-fill"></div></div>

<div class="layout">
  <div class="col-left">

    <div class="map-card">
      <div id="map"></div>
      <div class="map-foot">
        <span class="map-coords" id="mapCoords">📍 Diadema, SP</span>
        <button class="btn-loc" onclick="getLocation()">📍 Minha Localização</button>
      </div>
    </div>

    <div class="cfg-card">
      <h3>⚙️ Filtros</h3>
      <div class="cfg-grid">
        <div class="cfg-field"><label>Raio (km)</label><input type="number" id="raioMaximo" value="5" min="1" max="50" step="0.5"></div>
        <div class="cfg-field"><label>Ganho Mín (R$)</label><input type="number" id="ganhoMinimo" value="10" min="0" step="0.5"></div>
        <div class="cfg-field"><label>Dist. Máx (km)</label><input type="number" id="distanciaMaxima" value="10" min="1" max="100"></div>
        <div class="cfg-field"><label>Latitude</label><input type="number" id="latInput" value="-23.6721" step="0.0001"></div>
        <div class="cfg-field"><label>Longitude</label><input type="number" id="lngInput" value="-46.6077" step="0.0001"></div>
      </div>
      <button class="btn-save" onclick="saveConfig()">💾 Salvar Configurações</button>
    </div>

    <div class="plt-card">
      <h3>📱 Plataformas</h3>
      <div class="plt-grid">
        <div class="plt-btn on-ifood" id="ptoggle-ifood" onclick="togglePlatform('ifood')">
          <div class="plt-dot" style="background:var(--ifood)"></div>
          <span class="plt-name" style="color:var(--ifood)">iFood</span>
          <span class="plt-cnt" id="pcnt-ifood">0</span>
        </div>
        <div class="plt-btn on-ubereats" id="ptoggle-ubereats" onclick="togglePlatform('ubereats')">
          <div class="plt-dot" style="background:var(--uber)"></div>
          <span class="plt-name" style="color:var(--uber)">Uber Eats</span>
          <span class="plt-cnt" id="pcnt-ubereats">0</span>
        </div>
        <div class="plt-btn on-keeta" id="ptoggle-keeta" onclick="togglePlatform('keeta')">
          <div class="plt-dot" style="background:var(--keeta)"></div>
          <span class="plt-name" style="color:var(--keeta)">Keeta</span>
          <span class="plt-cnt" id="pcnt-keeta">0</span>
        </div>
        <div class="plt-btn on-loggi" id="ptoggle-loggi" onclick="togglePlatform('loggi')">
          <div class="plt-dot" style="background:var(--loggi)"></div>
          <span class="plt-name" style="color:var(--loggi)">Loggi</span>
          <span class="plt-cnt" id="pcnt-loggi">0</span>
        </div>
      </div>
    </div>

  </div>

  <div class="col-right">

    <div class="stats-card">
      <div class="stats-grid">
        <div class="stat-box ifood"><div class="stat-v" id="st-ifood">0</div><div class="stat-l">iFood</div></div>
        <div class="stat-box uber"><div class="stat-v" id="st-ubereats">0</div><div class="stat-l">Uber</div></div>
        <div class="stat-box keeta"><div class="stat-v" id="st-keeta">0</div><div class="stat-l">Keeta</div></div>
        <div class="stat-box loggi"><div class="stat-v" id="st-loggi">0</div><div class="stat-l">Loggi</div></div>
      </div>
    </div>

    <div class="rides-card">
      <div class="rides-head">
        <h3>📦 Ofertas</h3>
        <span class="rides-badge" id="ridesBadge">0</span>
      </div>
      <div class="rides-list" id="ridesList">
        <div class="empty"><span class="empty-icon">🛵</span><span>Aguardando ofertas...</span></div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var BACKEND = '';
var POLL_MS = 2000;
var PLT_COLORS  = {ifood:'#ea1d2c',ubereats:'#222',keeta:'#00b4d8',loggi:'#ff6b00'};
var PLT_LABELS  = {ifood:'iFood',ubereats:'Uber Eats',keeta:'Keeta',loggi:'Loggi'};
var PLT_LOGOS   = {ifood:'iFood',ubereats:'Uber',keeta:'keeta',loggi:'Loggi'};

var map, userMarker, circle;
var rideMarkers   = [];
var allRides      = [];
var pltStates     = {ifood:true,ubereats:true,keeta:true,loggi:true};
var alertTimer;
var seenRealIds   = {};
var countdownTimers = {};

// ── MAPA ──────────────────────────────────────────────────────
function initMap() {
  var pos = {lat:-23.6721,lng:-46.6077};
  map = new google.maps.Map(document.getElementById('map'),{
    zoom:14,center:pos,
    mapTypeControl:false,fullscreenControl:false,streetViewControl:false
  });
  userMarker = new google.maps.Marker({
    position:pos,map:map,title:'Você',
    icon:{path:google.maps.SymbolPath.CIRCLE,scale:10,fillColor:'#667eea',fillOpacity:1,strokeColor:'#fff',strokeWeight:3},
    zIndex:999
  });
  drawCircle(pos);
  getLocationSilent();
  fetchRides();
  setInterval(fetchRides, POLL_MS);
}

function getLocationSilent() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    function(p){ applyLocation(p); },
    function(){ console.log('[GPS] Usando padrão'); },
    {enableHighAccuracy:false,timeout:8000,maximumAge:60000}
  );
}

function getLocation() {
  if (!navigator.geolocation) { showToast('⚠️ Sem suporte a GPS','error'); return; }
  showToast('📡 Obtendo localização...','info');
  navigator.geolocation.getCurrentPosition(
    function(p){ applyLocation(p); showToast('📍 Localização obtida!','success'); },
    function(e){
      var m = '⚠️ GPS indisponível';
      if (e.code===1) m='🔒 Permissão negada';
      if (e.code===2) m='📡 Sinal indisponível';
      if (e.code===3) m='⏱️ Tempo esgotado';
      showToast(m,'error');
    },
    {enableHighAccuracy:true,timeout:15000,maximumAge:30000}
  );
}

function applyLocation(p) {
  var lat=p.coords.latitude, lng=p.coords.longitude;
  userMarker.setPosition({lat:lat,lng:lng});
  map.panTo({lat:lat,lng:lng}); map.setZoom(14);
  document.getElementById('latInput').value=lat.toFixed(6);
  document.getElementById('lngInput').value=lng.toFixed(6);
  document.getElementById('mapCoords').textContent='📍 '+lat.toFixed(4)+', '+lng.toFixed(4);
  drawCircle({lat:lat,lng:lng});
}

function drawCircle(c) {
  if (circle) circle.setMap(null);
  var r=parseFloat(document.getElementById('raioMaximo').value)||5;
  circle=new google.maps.Circle({center:c,radius:r*1000,map:map,fillColor:'#667eea',fillOpacity:.10,strokeColor:'#667eea',strokeOpacity:.5,strokeWeight:2});
}

// ── POLLING ───────────────────────────────────────────────────
function fetchRides() {
  fetch(BACKEND+'/api/rides')
    .then(function(r){return r.json();})
    .then(function(data){
      allRides = data;
      // Detecta novas ofertas reais
      data.forEach(function(ride){
        if (ride.source==='real' && ride.status==='pending' && !seenRealIds[ride.id]) {
          seenRealIds[ride.id] = true;
          triggerAlert(ride);
        }
      });
      // Remove timers de corridas que sumiram
      Object.keys(countdownTimers).forEach(function(id){
        var still = data.some(function(r){return r.id===id&&r.status==='pending';});
        if (!still) stopCountdown(id);
      });
      renderRides();
      updateStats();
      document.getElementById('hstatusText').textContent='Online';
    })
    .catch(function(){ document.getElementById('hstatusText').textContent='Offline'; });
}

function triggerAlert(ride) {
  var el = document.getElementById('alertReal');
  el.textContent = '🚨 '+PLT_LABELS[ride.platform]+' — R$ '+parseFloat(ride.earnings).toFixed(2)+' | '+ride.distance+' km';
  el.classList.add('show');
  clearTimeout(alertTimer);
  alertTimer = setTimeout(function(){ el.classList.remove('show'); }, 8000);
  if (navigator.vibrate) navigator.vibrate([300,80,300,80,500]);
  showToast('🚨 Nova oferta! R$ '+parseFloat(ride.earnings).toFixed(2),'real');
}

// ── FILTROS ───────────────────────────────────────────────────
function getFiltered() {
  var ganhoMin = parseFloat(document.getElementById('ganhoMinimo').value)||0;
  var raio     = parseFloat(document.getElementById('raioMaximo').value)||5;
  var upos     = userMarker.getPosition();
  return allRides.filter(function(ride){
    if (ride.status!=='pending') return false;
    if (!pltStates[ride.platform]) return false;
    if (parseFloat(ride.earnings)<ganhoMin) return false;
    var dist = google.maps.geometry.spherical.computeDistanceBetween(
      upos, new google.maps.LatLng(ride.lat,ride.lng)
    )/1000;
    return dist<=raio;
  });
}

// ═══════════════════════════════════════════════════════════
// RENDERIZAR OFERTAS — estilo visual do Keeta/iFood
// ═══════════════════════════════════════════════════════════
function renderRides() {
  var filtered  = getFiltered();
  var container = document.getElementById('ridesList');
  document.getElementById('ridesBadge').textContent = filtered.length;

  if (!filtered.length) {
    Object.keys(countdownTimers).forEach(stopCountdown);
    container.innerHTML='<div class="empty"><span class="empty-icon">🛵</span><span>Aguardando ofertas...</span></div>';
    updateMarkers([]);
    return;
  }

  var html = '';
  for (var i=0; i<filtered.length; i++) {
    var ride = filtered[i];
    var p    = ride.platform;
    var logo = PLT_LOGOS[p] || p;

    var secsLeft = ride.expiresAt
      ? Math.max(0, Math.round((new Date(ride.expiresAt).getTime()-Date.now())/1000))
      : 40;
    var total = ride.expirySecs || 40;
    var pct   = total>0 ? Math.round((secsLeft/total)*100) : 0;
    var urg   = secsLeft<=8;

    // Arco SVG do timer circular
    var r=26, circ=2*Math.PI*r;
    var dash = Math.round((pct/100)*circ);

    html +=
      '<div class="offer-card '+p+'" id="oc-'+ride.id+'">' +

        /* ─ Cabeçalho escuro ─ */
        '<div class="offer-head">' +
          '<div>' +
            '<div class="offer-earn" id="earn-'+ride.id+'">R$ '+parseFloat(ride.earnings).toFixed(2).replace('.',',')+'</div>' +
          '</div>' +
          /* Timer circular */
          '<div class="offer-timer-wrap">' +
            '<div class="offer-timer-circle'+(urg?' urgente':'')+'" id="tc-'+ride.id+'">' +
              '<svg viewBox="0 0 60 60"><circle cx="30" cy="30" r="'+r+'" stroke="rgba(255,255,255,0.2)" stroke-width="4"/>' +
              '<circle id="arc-'+ride.id+'" cx="30" cy="30" r="'+r+'" stroke="'+(urg?'#ff4444':'#fff')+'" stroke-width="4" stroke-dasharray="'+dash+' '+circ+'" stroke-dashoffset="0" fill="none" transform="rotate(-90 30 30)"/></svg>' +
              '<span class="offer-timer-num" id="tn-'+ride.id+'">'+secsLeft+'</span>' +
            '</div>' +
            /* Logo */
            '<div class="offer-logo">'+logo+'</div>' +
          '</div>' +
        '</div>' +

        /* Barra de progresso */
        '<div class="offer-progress"><div class="offer-progress-fill" id="pb-'+ride.id+'" style="width:'+pct+'%"></div></div>' +

        /* ─ Corpo branco ─ */
        '<div class="offer-body">' +
          /* Distância total */
          '<div class="offer-km">↔ '+parseFloat(ride.distance).toFixed(1)+' km total</div>' +
          /* Rota */
          '<div class="offer-route">' +
            '<div class="offer-row">' +
              '<span class="offer-icon">🍽️</span>' +
              '<div><div class="offer-addr">'+escHtml(ride.origem||'Restaurante')+'</div></div>' +
            '</div>' +
            '<div class="offer-divider"></div>' +
            '<div class="offer-row">' +
              '<span class="offer-icon">📍</span>' +
              '<div><div class="offer-addr">'+escHtml(ride.destination)+'</div></div>' +
            '</div>' +
          '</div>' +
        '</div>' +

        /* ─ Botão ACEITAR ─ */
        '<div class="offer-btn-wrap">' +
          '<button class="btn-pegar'+(urg?' urgente':'')+'" id="bp-'+ride.id+'" onclick="acceptRide(\''+ride.id+'\',\''+p+'\')">'+
            '✅ Pegar ('+secsLeft+'s)'+
          '</button>' +
          '<button class="btn-skip" onclick="rejectRide(\''+ride.id+'\',\''+p+'\')">Ignorar oferta</button>' +
        '</div>' +

      '</div>';
  }

  container.innerHTML = html;
  updateMarkers(filtered);
  filtered.forEach(function(ride){ startCountdown(ride); });
}

// ── COUNTDOWN ─────────────────────────────────────────────────
function startCountdown(ride) {
  if (countdownTimers[ride.id]) return;
  var total = ride.expirySecs || 40;
  var circ  = 2*Math.PI*26;

  countdownTimers[ride.id] = setInterval(function(){
    var s   = Math.max(0, Math.round((new Date(ride.expiresAt).getTime()-Date.now())/1000));
    var pct = total>0 ? Math.round((s/total)*100) : 0;
    var urg = s<=8;
    var dash= Math.round((pct/100)*circ);

    // Atualiza elementos
    var tn  = document.getElementById('tn-'+ride.id);
    var tc  = document.getElementById('tc-'+ride.id);
    var arc = document.getElementById('arc-'+ride.id);
    var pb  = document.getElementById('pb-'+ride.id);
    var bp  = document.getElementById('bp-'+ride.id);

    if (tn)  tn.textContent = s;
    if (tc)  tc.className   = 'offer-timer-circle'+(urg?' urgente':'');
    if (arc) { arc.setAttribute('stroke-dasharray', dash+' '+circ); arc.setAttribute('stroke', urg?'#ff4444':'#fff'); }
    if (pb)  pb.style.width = pct+'%';
    if (bp)  { bp.textContent = '✅ Pegar ('+s+'s)'; bp.className = 'btn-pegar'+(urg?' urgente':''); }

    if (s<=0) {
      stopCountdown(ride.id);
      var card = document.getElementById('oc-'+ride.id);
      if (card) {
        card.style.opacity='0';
        card.style.transition='opacity .4s';
        setTimeout(function(){ fetchRides(); },400);
      }
    }
  }, 1000);
}

function stopCountdown(id) {
  if (countdownTimers[id]) { clearInterval(countdownTimers[id]); delete countdownTimers[id]; }
}

// ── ACEITAR ───────────────────────────────────────────────────
function acceptRide(rideId, platform) {
  // Verifica expiração
  var ride = null;
  for (var i=0;i<allRides.length;i++){ if(allRides[i].id===rideId){ride=allRides[i];break;} }
  if (ride && ride.expiresAt && new Date(ride.expiresAt).getTime()<Date.now()) {
    showToast('⏰ Oferta expirada!','error'); fetchRides(); return;
  }
  fetch(BACKEND+'/api/accept-ride',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({rideId:rideId,platform:platform})
  })
  .then(function(r){return r.json();})
  .then(function(data){
    if (data.success) {
      showToast('✅ Aceita! MacroDroid vai clicar no app','success');
      document.getElementById('alertReal').classList.remove('show');
      stopCountdown(rideId);
      fetchRides();
    } else {
      showToast(data.reason==='Oferta expirada'?'⏰ Expirada!':'❌ Erro ao aceitar','error');
      fetchRides();
    }
  })
  .catch(function(){ showToast('❌ Sem conexão','error'); });
}

// ── REJEITAR ──────────────────────────────────────────────────
function rejectRide(rideId, platform) {
  fetch(BACKEND+'/api/reject-ride',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({rideId:rideId,platform:platform})
  })
  .then(function(r){return r.json();})
  .then(function(data){
    if (data.success){ stopCountdown(rideId); showToast('🗑️ Ignorada','info'); fetchRides(); }
  });
}

// ── MARCADORES ───────────────────────────────────────────────
function updateMarkers(rides) {
  for (var i=0;i<rideMarkers.length;i++) rideMarkers[i].setMap(null);
  rideMarkers=[];
  var icons={ifood:'http://maps.google.com/mapfiles/ms/icons/red-dot.png',ubereats:'http://maps.google.com/mapfiles/ms/icons/purple-dot.png',keeta:'http://maps.google.com/mapfiles/ms/icons/blue-dot.png',loggi:'http://maps.google.com/mapfiles/ms/icons/orange-dot.png'};
  for (var i=0;i<rides.length;i++){
    var ride=rides[i];
    var marker=new google.maps.Marker({
      position:{lat:ride.lat,lng:ride.lng},map:map,
      icon:icons[ride.platform],
      title:PLT_LABELS[ride.platform]+' R$'+parseFloat(ride.earnings).toFixed(2)
    });
    (function(m,r){
      var iw=new google.maps.InfoWindow({content:'<div style="padding:8px;font-size:12px"><strong>'+PLT_LABELS[r.platform]+'</strong><br>💰 R$ '+parseFloat(r.earnings).toFixed(2)+'<br>🛣️ '+parseFloat(r.distance).toFixed(1)+' km<br>📍 '+escHtml(r.destination)+'</div>'});
      m.addListener('click',function(){iw.open(map,m);});
    })(marker,ride);
    rideMarkers.push(marker);
  }
}

// ── CONFIG ────────────────────────────────────────────────────
function saveConfig() {
  var pos=userMarker.getPosition();
  var lat=parseFloat(document.getElementById('latInput').value)||pos.lat();
  var lng=parseFloat(document.getElementById('lngInput').value)||pos.lng();
  fetch(BACKEND+'/api/config',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      latitude:lat,longitude:lng,
      raioMaximo:parseFloat(document.getElementById('raioMaximo').value),
      ganhoMinimo:parseFloat(document.getElementById('ganhoMinimo').value),
      distanciaMaxima:parseFloat(document.getElementById('distanciaMaxima').value)
    })
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.success){
      showToast('💾 Salvo!','success');
      userMarker.setPosition({lat:lat,lng:lng});
      map.panTo({lat:lat,lng:lng});
      drawCircle({lat:lat,lng:lng});
    }
  });
}

function togglePlatform(p) {
  fetch(BACKEND+'/api/platform/'+p+'/toggle',{method:'POST'})
    .then(function(r){return r.json();})
    .then(function(d){
      pltStates[p]=d.enabled;
      var el=document.getElementById('ptoggle-'+p);
      if(d.enabled){el.classList.remove('off');showToast('✅ '+PLT_LABELS[p]+' ativo','success');}
      else{el.classList.add('off');showToast('⏸️ '+PLT_LABELS[p]+' pausado','info');}
      renderRides();
    });
}

function updateStats() {
  ['ifood','ubereats','keeta','loggi'].forEach(function(p){
    var n=0;
    for(var i=0;i<allRides.length;i++){if(allRides[i].platform===p&&allRides[i].status==='pending')n++;}
    var sv=document.getElementById('st-'+p);
    var sc=document.getElementById('pcnt-'+p);
    if(sv)sv.textContent=n;
    if(sc)sc.textContent=n;
  });
}

function escHtml(s){
  if(!s)return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

var toastTimer;
function showToast(msg,type){
  var el=document.getElementById('toast');
  el.textContent=msg; el.className='toast '+(type||'info')+' show';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){el.classList.remove('show');},3500);
}

document.getElementById('raioMaximo').addEventListener('change',function(){
  drawCircle(userMarker.getPosition().toJSON()); renderRides();
});
document.getElementById('ganhoMinimo').addEventListener('change',renderRides);
</script>
