<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>DeliveryHub</title>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDQC2JCQhdB38fTrvmNz_Wbv0arXvmsR8g&libraries=geometry&callback=initMap" async defer></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#667eea;--success:#28a745;--danger:#dc3545;
  --ifood:#ea1d2c;--uber:#222;--keeta:#00b4d8;--loggi:#ff6b00;
  --bg:#f0f2f5;--card:#fff;--border:#e0e0e0;--muted:#888;
  --shadow:0 4px 18px rgba(0,0,0,.10);--radius:14px;
}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column}

/* ── HEADER ── */
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(102,126,234,.4)}
.header h1{font-size:18px;font-weight:800}
.header p{font-size:11px;opacity:.85;margin-top:1px}
.hstatus{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700}
.dot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
.tbar{height:3px;background:#ddd}
.tbar-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);animation:tbar 2s linear infinite;transform-origin:left}
@keyframes tbar{0%{transform:scaleX(1)}100%{transform:scaleX(0)}}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;gap:12px;padding:12px;max-width:1400px;margin:0 auto;width:100%}
.col-left{flex:1;display:flex;flex-direction:column;gap:12px;min-width:0}
.col-right{width:340px;display:flex;flex-direction:column;gap:12px;flex-shrink:0}

/* ── MAPA ── */
.map-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
#map{height:300px;width:100%}
.map-foot{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;background:#fafafa;border-top:1px solid var(--border)}
.map-coords{font-size:11px;color:var(--muted)}
.btn-loc{padding:8px 14px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer}

/* ── FILTROS ── */
.cfg-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
.cfg-card h3{font-size:14px;font-weight:700;margin-bottom:12px}
.cfg-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.cfg-field label{display:block;font-size:11px;color:var(--muted);font-weight:700;margin-bottom:4px;text-transform:uppercase}
.cfg-field input{width:100%;padding:9px 10px;border:2px solid var(--border);border-radius:8px;font-size:13px;background:#fafafa}
.cfg-field input:focus{outline:none;border-color:var(--primary)}
.btn-save{width:100%;padding:11px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer}

/* ── PLATAFORMAS ── */
.plt-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
.plt-card h3{font-size:14px;font-weight:700;margin-bottom:12px}
.plt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.plt-btn{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;cursor:pointer;border:2px solid transparent;background:#f8f8f8;user-select:none}
.plt-btn.on-ifood{border-color:var(--ifood);background:#fff5f5}
.plt-btn.on-ubereats{border-color:var(--uber);background:#f5f5f5}
.plt-btn.on-keeta{border-color:var(--keeta);background:#f0faff}
.plt-btn.on-loggi{border-color:var(--loggi);background:#fff8f0}
.plt-btn.off{opacity:.4;border-color:var(--border)!important;background:#f0f0f0!important}
.plt-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.plt-name{font-size:12px;font-weight:800;flex:1}
.plt-cnt{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;background:rgba(0,0,0,.07);min-width:22px;text-align:center}

/* ── STATS ── */
.stats-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.stat-box{text-align:center;padding:10px 6px;border-radius:10px;border-top:3px solid var(--primary);background:#f5f7ff}
.stat-box.ifood{border-color:var(--ifood);background:#fff5f5}
.stat-box.uber{border-color:var(--uber);background:#f5f5f5}
.stat-box.keeta{border-color:var(--keeta);background:#f0faff}
.stat-box.loggi{border-color:var(--loggi);background:#fff8f0}
.stat-v{font-size:20px;font-weight:800;color:#333}
.stat-l{font-size:10px;color:var(--muted);margin-top:3px;font-weight:700;text-transform:uppercase}

/* ── LISTA CORRIDAS ── */
.rides-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden}
.rides-head{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.rides-head h3{font-size:15px;font-weight:700}
.rides-badge{background:var(--primary);color:#fff;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700}
.rides-list{overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px;max-height:520px}

/* ── CARD DE CORRIDA ── */
.ride-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:14px;border-left:5px solid var(--primary);position:relative;overflow:hidden;animation:slideIn .3s ease-out}
@keyframes slideIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.ride-card[data-p="ifood"]{border-left-color:var(--ifood)}
.ride-card[data-p="ubereats"]{border-left-color:var(--uber)}
.ride-card[data-p="keeta"]{border-left-color:var(--keeta)}
.ride-card[data-p="loggi"]{border-left-color:var(--loggi)}

/* ═══════════════════════════════════════════
   TIMER DE EXPIRAÇÃO — BARRA DE PROGRESSO
   ═══════════════════════════════════════════ */
.ride-timer-bar{
  position:absolute;bottom:0;left:0;height:4px;
  transition:width 1s linear;
  border-radius:0 0 0 14px;
}
.ride-card[data-p="ifood"]   .ride-timer-bar{background:var(--ifood)}
.ride-card[data-p="ubereats"] .ride-timer-bar{background:var(--uber)}
.ride-card[data-p="keeta"]   .ride-timer-bar{background:var(--keeta)}
.ride-card[data-p="loggi"]   .ride-timer-bar{background:var(--loggi)}
.ride-timer-bar.urgente{background:#ff4444!important;animation:pulse 0.5s infinite}

/* Contador de segundos */
.ride-timer-text{
  position:absolute;top:8px;left:12px;
  font-size:11px;font-weight:800;
  background:rgba(0,0,0,.08);
  padding:2px 8px;border-radius:10px;
  color:#333;
}
.ride-timer-text.urgente{background:#ff4444;color:#fff;animation:pulse .5s infinite}

.badge-real{position:absolute;top:8px;right:8px;background:#ea1d2c;color:#fff;font-size:9px;font-weight:800;padding:3px 9px;border-radius:8px;animation:pulse .8s infinite}

.ride-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:22px 70px 0 0}
.ride-plt{display:flex;align-items:center;gap:5px}
.ride-plt-dot{width:8px;height:8px;border-radius:50%}
.ride-plt-name{font-size:12px;font-weight:800;letter-spacing:.5px}
.ride-earn{font-size:22px;font-weight:800;color:var(--success)}

.ride-dest{background:#f5f7ff;border-left:3px solid var(--primary);padding:7px 10px;border-radius:0 8px 8px 0;font-size:12px;margin-bottom:8px;line-height:1.4}
.ride-card[data-p="ifood"]    .ride-dest{border-color:var(--ifood);background:#fff8f8}
.ride-card[data-p="keeta"]    .ride-dest{border-color:var(--keeta);background:#f0faff}
.ride-card[data-p="ubereats"] .ride-dest{border-color:var(--uber);background:#f5f5f5}
.ride-card[data-p="loggi"]    .ride-dest{border-color:var(--loggi);background:#fff8f0}

.ride-meta{display:flex;gap:12px;margin-bottom:10px}
.ride-meta span{font-size:11px;color:var(--muted)}
.ride-meta strong{color:#333;font-size:12px}

/* Botões GRANDES e fáceis de tocar */
.ride-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.btn-ac,.btn-rj{
  padding:13px 10px;border:none;border-radius:10px;
  font-size:14px;font-weight:800;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;
  letter-spacing:.3px;
}
.btn-ac{background:var(--success);color:#fff;box-shadow:0 4px 12px rgba(40,167,69,.35)}
.btn-rj{background:var(--danger);color:#fff;box-shadow:0 4px 12px rgba(220,53,69,.25)}
.btn-ac:active{transform:scale(.97)}
.btn-rj:active{transform:scale(.97)}

.empty{text-align:center;color:var(--muted);padding:40px 20px;display:flex;flex-direction:column;align-items:center;gap:10px}
.empty-icon{font-size:42px;opacity:.4}

/* ── ALERTA TOPO ── */
.alert-real{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#ea1d2c;color:#fff;padding:14px 24px;border-radius:14px;font-weight:800;font-size:14px;box-shadow:0 8px 30px rgba(234,29,44,.5);z-index:9997;display:none;text-align:center;width:92%;max-width:380px}
.alert-real.show{display:block;animation:pulse .6s infinite}

/* ── MODAL OFERTA REAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9998;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:20px;padding:28px 24px;max-width:340px;width:92%;box-shadow:0 24px 60px rgba(0,0,0,.35);text-align:center}
.modal-icon{font-size:52px;margin-bottom:10px}
.modal h2{font-size:22px;margin-bottom:6px;font-weight:800}
.modal-platform{font-size:13px;font-weight:700;margin-bottom:6px;padding:4px 14px;border-radius:20px;display:inline-block}
.modal-platform.ifood{background:#fff0f0;color:var(--ifood)}
.modal-platform.keeta{background:#f0faff;color:var(--keeta)}
.modal-platform.ubereats{background:#f5f5f5;color:var(--uber)}
.modal-platform.loggi{background:#fff8f0;color:var(--loggi)}
.modal-earn{font-size:36px;font-weight:800;color:var(--success);margin:10px 0 4px}
.modal-dest{font-size:13px;color:#555;margin-bottom:6px;line-height:1.5}
.modal-meta{font-size:12px;color:var(--muted);margin-bottom:16px}

/* Timer circular no modal */
.modal-timer{
  width:64px;height:64px;border-radius:50%;
  border:5px solid #eee;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;
  font-size:20px;font-weight:800;color:#333;
  position:relative;
}
.modal-timer.urgente{border-color:#ff4444;color:#ff4444;animation:pulse .5s infinite}

.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-modal-ok{padding:16px;background:var(--success);color:#fff;border:none;border-radius:10px;font-weight:800;font-size:16px;cursor:pointer;box-shadow:0 4px 14px rgba(40,167,69,.4)}
.btn-modal-cancel{padding:16px;background:#eee;color:#333;border:none;border-radius:10px;font-weight:700;font-size:16px;cursor:pointer}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);padding:12px 22px;background:#333;color:#fff;border-radius:30px;font-size:13px;font-weight:700;box-shadow:0 6px 24px rgba(0,0,0,.25);z-index:9999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}
.toast.info{background:var(--primary)}
.toast.real{background:#ea1d2c}

@media(max-width:960px){
  .layout{flex-direction:column}
  .col-right{width:100%}
  #map{height:220px}
  .cfg-grid{grid-template-columns:1fr 1fr}
  .btn-ac,.btn-rj{padding:15px 10px;font-size:15px}
}
</style>
</head>
<body>

<div class="alert-real" id="alertReal">🚨 CORRIDA REAL!</div>

<div class="header">
  <div><h1>🚗 DeliveryHub</h1><p>Monitor em Tempo Real</p></div>
  <div class="hstatus"><div class="dot"></div><span id="hstatusText">Online</span></div>
</div>
<div class="tbar"><div class="tbar-fill"></div></div>

<div class="layout">
  <div class="col-left">

    <div class="map-card">
      <div id="map"></div>
      <div class="map-foot">
        <span class="map-coords" id="mapCoords">📍 Santo André, SP</span>
        <button class="btn-loc" onclick="getLocation()">📍 Minha Localização</button>
      </div>
    </div>

    <div class="cfg-card">
      <h3>⚙️ Filtros</h3>
      <div class="cfg-grid">
        <div class="cfg-field"><label>Raio (km)</label><input type="number" id="raioMaximo" value="5" min="1" max="50" step="0.5"></div>
        <div class="cfg-field"><label>Ganho Mín (R$)</label><input type="number" id="ganhoMinimo" value="15" min="0" step="0.5"></div>
        <div class="cfg-field"><label>Dist. Máx (km)</label><input type="number" id="distanciaMaxima" value="10" min="1" max="100"></div>
        <div class="cfg-field"><label>Latitude</label><input type="number" id="latInput" value="-23.6821" step="0.0001"></div>
        <div class="cfg-field"><label>Longitude</label><input type="number" id="lngInput" value="-46.5650" step="0.0001"></div>
      </div>
      <button class="btn-save" onclick="saveConfig()">💾 Salvar Configurações</button>
    </div>

    <div class="plt-card">
      <h3>📱 Plataformas</h3>
      <div class="plt-grid">
        <div class="plt-btn on-ifood" id="ptoggle-ifood" onclick="togglePlatform('ifood')">
          <div class="plt-dot" style="background:var(--ifood)"></div>
          <span class="plt-name" style="color:var(--ifood)">iFood</span>
          <span class="plt-cnt" id="pcnt-ifood">0</span>
        </div>
        <div class="plt-btn on-ubereats" id="ptoggle-ubereats" onclick="togglePlatform('ubereats')">
          <div class="plt-dot" style="background:var(--uber)"></div>
          <span class="plt-name" style="color:var(--uber)">Uber Eats</span>
          <span class="plt-cnt" id="pcnt-ubereats">0</span>
        </div>
        <div class="plt-btn on-keeta" id="ptoggle-keeta" onclick="togglePlatform('keeta')">
          <div class="plt-dot" style="background:var(--keeta)"></div>
          <span class="plt-name" style="color:var(--keeta)">Keeta</span>
          <span class="plt-cnt" id="pcnt-keeta">0</span>
        </div>
        <div class="plt-btn on-loggi" id="ptoggle-loggi" onclick="togglePlatform('loggi')">
          <div class="plt-dot" style="background:var(--loggi)"></div>
          <span class="plt-name" style="color:var(--loggi)">Loggi</span>
          <span class="plt-cnt" id="pcnt-loggi">0</span>
        </div>
      </div>
    </div>

  </div>

  <div class="col-right">

    <div class="stats-card">
      <div class="stats-grid">
        <div class="stat-box ifood"><div class="stat-v" id="st-ifood">0</div><div class="stat-l">iFood</div></div>
        <div class="stat-box uber"><div class="stat-v" id="st-ubereats">0</div><div class="stat-l">Uber</div></div>
        <div class="stat-box keeta"><div class="stat-v" id="st-keeta">0</div><div class="stat-l">Keeta</div></div>
        <div class="stat-box loggi"><div class="stat-v" id="st-loggi">0</div><div class="stat-l">Loggi</div></div>
      </div>
    </div>

    <div class="rides-card">
      <div class="rides-head">
        <h3>📦 Ofertas</h3>
        <span class="rides-badge" id="ridesBadge">0</span>
      </div>
      <div class="rides-list" id="ridesList">
        <div class="empty"><span class="empty-icon">🛵</span><span>Aguardando ofertas...</span></div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL OFERTA REAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-icon">🚨</div>
    <h2>Nova Oferta!</h2>
    <div class="modal-platform" id="modalPlatform">iFood</div>
    <div class="modal-earn" id="modalEarn">R$ 0,00</div>
    <div class="modal-dest" id="modalDest"></div>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-timer" id="modalTimer">25</div>
    <div class="modal-btns">
      <button class="btn-modal-ok"     onclick="confirmAcceptReal()">✅ ACEITAR</button>
      <button class="btn-modal-cancel" onclick="closeModal()">❌ Recusar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Configurações ─────────────────────────────────────────────
var BACKEND = '';
var POLL_MS = 2000;

var PLT_COLORS  = {ifood:'#ea1d2c',ubereats:'#222222',keeta:'#00b4d8',loggi:'#ff6b00'};
var PLT_LABELS  = {ifood:'iFood',ubereats:'Uber Eats',keeta:'Keeta',loggi:'Loggi'};
var PLT_EMOJIS  = {ifood:'🍔',ubereats:'🚗',keeta:'🟦',loggi:'📦'};
var PLT_ICONS   = {
  ifood:   'http://maps.google.com/mapfiles/ms/icons/red-dot.png',
  ubereats:'http://maps.google.com/mapfiles/ms/icons/purple-dot.png',
  keeta:   'http://maps.google.com/mapfiles/ms/icons/blue-dot.png',
  loggi:   'http://maps.google.com/mapfiles/ms/icons/orange-dot.png'
};

// ── Estado ───────────────────────────────────────────────────
var map, userMarker, circle;
var rideMarkers     = [];
var allRides        = [];
var pltStates       = {ifood:true,ubereats:true,keeta:true,loggi:true};
var pendingRealRide = null;
var alertTimer;
var seenRealIds     = {};

// Timers de countdown por rideId
var countdownTimers = {};

// ── Mapa ─────────────────────────────────────────────────────
function initMap() {
  var pos = {lat:-23.6821,lng:-46.5650};
  map = new google.maps.Map(document.getElementById('map'),{
    zoom:14,center:pos,
    mapTypeControl:false,fullscreenControl:false,streetViewControl:false
  });
  userMarker = new google.maps.Marker({
    position:pos,map:map,title:'Você',
    icon:{path:google.maps.SymbolPath.CIRCLE,scale:10,fillColor:'#667eea',fillOpacity:1,strokeColor:'#fff',strokeWeight:3},
    zIndex:999
  });
  drawCircle(pos);
  getLocationSilent();
  fetchRides();
  setInterval(fetchRides, POLL_MS);
}

// GPS silencioso no carregamento
function getLocationSilent() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    function(pos){ applyLocation(pos); },
    function(){ console.log('[GPS] Usando coordenada padrão'); },
    {enableHighAccuracy:false,timeout:8000,maximumAge:60000}
  );
}

// GPS manual — com feedback
function getLocation() {
  if (!navigator.geolocation) { showToast('⚠️ Navegador sem GPS','error'); return; }
  showToast('📡 Obtendo localização...','info');
  navigator.geolocation.getCurrentPosition(
    function(pos){ applyLocation(pos); showToast('📍 Localização obtida!','success'); },
    function(err){
      var msg = '⚠️ GPS indisponível';
      if (err.code===1) msg = '🔒 Permissão de GPS negada';
      if (err.code===2) msg = '📡 Sinal GPS indisponível';
      if (err.code===3) msg = '⏱️ GPS: tente ao ar livre';
      showToast(msg,'error');
    },
    {enableHighAccuracy:true,timeout:15000,maximumAge:30000}
  );
}

function applyLocation(pos) {
  var lat = pos.coords.latitude;
  var lng = pos.coords.longitude;
  userMarker.setPosition({lat:lat,lng:lng});
  map.panTo({lat:lat,lng:lng});
  map.setZoom(14);
  document.getElementById('latInput').value = lat.toFixed(6);
  document.getElementById('lngInput').value = lng.toFixed(6);
  document.getElementById('mapCoords').textContent = '📍 '+lat.toFixed(4)+', '+lng.toFixed(4);
  drawCircle({lat:lat,lng:lng});
}

function drawCircle(center) {
  if (circle) circle.setMap(null);
  var r = parseFloat(document.getElementById('raioMaximo').value)||5;
  circle = new google.maps.Circle({
    center:center,radius:r*1000,map:map,
    fillColor:'#667eea',fillOpacity:.10,
    strokeColor:'#667eea',strokeOpacity:.5,strokeWeight:2
  });
}

// ── Polling de corridas ───────────────────────────────────────
function fetchRides() {
  fetch(BACKEND+'/api/rides')
    .then(function(r){return r.json();})
    .then(function(data){
      allRides = data;

      // Detecta novas corridas reais
      data.forEach(function(ride) {
        if (ride.source==='real' && ride.status==='pending' && !seenRealIds[ride.id]) {
          seenRealIds[ride.id] = true;
          triggerRealAlert(ride);
        }
      });

      // Remove timers de corridas que sumiram
      Object.keys(countdownTimers).forEach(function(id) {
        var still = data.some(function(r){ return r.id===id && r.status==='pending'; });
        if (!still) stopCountdown(id);
      });

      renderRides();
      updateStats();
      document.getElementById('hstatusText').textContent = 'Online';
    })
    .catch(function(){
      document.getElementById('hstatusText').textContent = 'Offline';
    });
}

// ── Filtro ────────────────────────────────────────────────────
function getFiltered() {
  var ganhoMin = parseFloat(document.getElementById('ganhoMinimo').value)||0;
  var raio     = parseFloat(document.getElementById('raioMaximo').value)||5;
  var upos     = userMarker.getPosition();
  return allRides.filter(function(ride) {
    if (ride.status !== 'pending')   return false;
    if (!pltStates[ride.platform])   return false;
    if (parseFloat(ride.earnings) < ganhoMin) return false;
    var dist = google.maps.geometry.spherical.computeDistanceBetween(
      upos, new google.maps.LatLng(ride.lat, ride.lng)
    )/1000;
    return dist <= raio;
  });
}

        // Badge REAL (canto superior direito)
        '<div class="badge-real">🔴 REAL</div>' +
        // Plataforma + valor
        '<div class="ride-top">' +
          '<div class="ride-plt">' +
            '<div class="ride-plt-dot" style="background:'+c+'"></div>' +
            '<span class="ride-plt-name" style="color:'+c+'">'+(emoji+' '+l.toUpperCase())+'</span>' +
          '</div>' +
          '<span class="ride-earn">R$ '+parseFloat(ride.earnings).toFixed(2)+'</span>' +
        '</div>' +
        // Destino
        '<div class="ride-dest">📍 '+escHtml(ride.destination)+'</div>' +
        // Meta
        '<div class="ride-meta">' +
          '<span>🛣️ <strong>'+parseFloat(ride.distance).toFixed(1)+' km</strong></span>' +
          '<span>⏱️ <strong>'+timeAgo(ride.timestamp)+'</strong></span>' +
        '</div>' +

        '<div class="ride-actions">' +

          '<button class="btn-rj" onclick="rejectRide(\''+ride.id+'\',\''+ride.platform+'\')">❌ Recusar</button>' +
        '</div>' +

        '<div class="ride-timer-bar'+(secsLeft<=5?' urgente':'')+'" id="tb-'+ride.id+'" style="width:'+pct+'%"></div>' +

  container.innerHTML = html;
  updateMarkers(filtered);

  // Inicia countdown para cada corrida visível
  filtered.forEach(function(ride) {
    if (ride.expiresAt) startCountdown(ride);
  });
}

// ── Countdown por card ────────────────────────────────────────
function startCountdown(ride) {
  // Evita duplicar timer
  if (countdownTimers[ride.id]) return;

  countdownTimers[ride.id] = setInterval(function() {
    var secsLeft = Math.max(0, Math.round(
      (new Date(ride.expiresAt).getTime() - Date.now()) / 1000
    ));
    var totalSecs = ride.expirySecs || 25;
    var pct = Math.round((secsLeft / totalSecs) * 100);
    var urgente = secsLeft <= 5;

    var tt = document.getElementById('tt-'+ride.id);
    var tb = document.getElementById('tb-'+ride.id);

    if (tt) {
      tt.textContent = '⏱ '+secsLeft+'s';
      tt.className = 'ride-timer-text'+(urgente?' urgente':'');
    }
    if (tb) {
      tb.style.width = pct+'%';
      tb.className = 'ride-timer-bar'+(urgente?' urgente':'');
    }

    // Expirou — remove o card da tela
    if (secsLeft <= 0) {
      stopCountdown(ride.id);
      var card = document.getElementById('rc-'+ride.id);
      if (card) {
        card.style.opacity = '0';
        card.style.transform = 'scale(.95)';
        card.style.transition = 'all .4s';
        setTimeout(function(){ fetchRides(); }, 400);
      }
    }
  }, 1000);
}

function stopCountdown(rideId) {
  if (countdownTimers[rideId]) {
    clearInterval(countdownTimers[rideId]);
    delete countdownTimers[rideId];
  }
}

// ── Aceitar ───────────────────────────────────────────────────
function acceptRide(rideId, platform) {
  // Encontra a corrida
  var ride = null;
  for (var i = 0; i < allRides.length; i++) {
    if (allRides[i].id === rideId) { ride = allRides[i]; break; }
  }

  // Verifica se ainda tem tempo
  if (ride && ride.expiresAt) {
    var secsLeft = Math.round((new Date(ride.expiresAt).getTime()-Date.now())/1000);
    if (secsLeft <= 0) {
      showToast('⏰ Oferta expirada!','error');
      fetchRides();
      return;
    }
  }

  // Preenche modal
  pendingRealRide = {rideId:rideId,platform:platform,ride:ride};

  var plt = document.getElementById('modalPlatform');
  plt.textContent = PLT_EMOJIS[platform]+' '+PLT_LABELS[platform];
  plt.className = 'modal-platform '+platform;

  document.getElementById('modalEarn').textContent =
    'R$ '+parseFloat(ride?ride.earnings:0).toFixed(2);
  document.getElementById('modalDest').textContent =
    '📍 '+(ride?ride.destination:'');
  document.getElementById('modalMeta').textContent =
    '🛣️ '+(ride?ride.distance:'?')+' km  •  MacroDroid aceita no app';

  // Timer no modal
  startModalTimer(ride);

  document.getElementById('modalOverlay').classList.add('show');
}

// Timer circular no modal
var modalTimerInterval = null;
function startModalTimer(ride) {
  var el = document.getElementById('modalTimer');
  if (modalTimerInterval) clearInterval(modalTimerInterval);

  if (!ride || !ride.expiresAt) { el.textContent = '–'; return; }

  function update() {
    var s = Math.max(0, Math.round((new Date(ride.expiresAt).getTime()-Date.now())/1000));
    el.textContent = s;
    el.className = 'modal-timer'+(s<=5?' urgente':'');
    if (s<=0) {
      clearInterval(modalTimerInterval);
      closeModal();
      showToast('⏰ Oferta expirada!','error');
      fetchRides();
    }
  }
  update();
  modalTimerInterval = setInterval(update, 1000);
}

function confirmAcceptReal() {
  if (!pendingRealRide) return;
  if (modalTimerInterval) clearInterval(modalTimerInterval);
  closeModal();
  doAccept(pendingRealRide.rideId, pendingRealRide.platform);
  showToast('🤖 MacroDroid abrindo '+PLT_LABELS[pendingRealRide.platform]+'...','info');
  pendingRealRide = null;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  if (modalTimerInterval) clearInterval(modalTimerInterval);
  pendingRealRide = null;
}

function doAccept(rideId, platform) {
  fetch(BACKEND+'/api/accept-ride',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({rideId:rideId,platform:platform})
  })
  .then(function(r){return r.json();})
  .then(function(data){
    if (data.success) {
      showToast('✅ Aceita! MacroDroid vai clicar no app','success');
      document.getElementById('alertReal').classList.remove('show');
      stopCountdown(rideId);
      fetchRides();
    } else {
      var msg = data.reason==='Oferta expirada' ? '⏰ Oferta expirada!' : '❌ Erro ao aceitar';
      showToast(msg,'error');
      fetchRides();
    }
  })
  .catch(function(){ showToast('❌ Sem conexão','error'); });
}

// ── Rejeitar ──────────────────────────────────────────────────
function rejectRide(rideId, platform) {
  fetch(BACKEND+'/api/reject-ride',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({rideId:rideId,platform:platform})
  })
  .then(function(r){return r.json();})
  .then(function(data){
    if (data.success) {
      stopCountdown(rideId);
      showToast('🗑️ Oferta recusada','info');
      fetchRides();
    }
  });
}
